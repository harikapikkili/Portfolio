<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Harika Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(120deg, #e0eaff 60%, #b3c6ff 100%);
            color: #222;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.14);
            padding: 1.2rem 4vw;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(58,102,224,0.10);
        }
        .navbar .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #3a66e0;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            text-shadow: 0 2px 8px rgba(58,102,224,0.08);
        }
        .navbar nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar nav a {
            color: #3a66e0;
            text-decoration: none;
            margin: 0 1.2rem;
            font-weight: 600;
            font-size: 1.08rem;
            transition: color 0.2s;
            position: relative;
            letter-spacing: 0.5px;
            padding: 2px 0;
        }
        .navbar nav a:after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #3a66e0;
            transition: width .3s;
            position: absolute;
            bottom: -4px;
            left: 0;
        }
        .navbar nav a:hover:after {
            width: 100%;
        }
        .navbar nav a:hover {
            color: #25408f;
        }
        .navbar .cta-btn {
            background: linear-gradient(90deg, #3a66e0 60%, #b3c6ff 100%);
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: 700;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(58,102,224,0.10);
            border: none;
            outline: none;
            font-size: 1.08rem;
            letter-spacing: 0.5px;
        }
        .navbar .cta-btn:hover {
            background: #25408f;
            box-shadow: 0 4px 18px rgba(58,102,224,0.18);
        }
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 3rem;
            padding: 2rem 0;
            background: linear-gradient(120deg, #e0eaff 60%, #b3c6ff 100%);
        }
        .hero-content {
            max-width: 520px;
            color: #222;
            animation: fadeInLeft 1.2s cubic-bezier(.4,2,.6,1);
        }
        .hero-content .subtitle {
            color: #25408f;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 0.7rem;
            text-transform: uppercase;
        }
        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            color: #222;
            letter-spacing: 1px;
        }
        .hero-content h1 .highlight {
            color: #3a66e0;
            background: linear-gradient(90deg, #3a66e0 60%, #b3c6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-content h2 {
            font-size: 2.1rem;
            font-weight: 700;
            margin: 0 0 1.2rem 0;
            color: #3a66e0;
            letter-spacing: 1px;
        }
        .hero-content h2 .highlight {
            color: #25408f;
        }
        .hero-content p {
            color: #5a6fa7;
            font-size: 1.13rem;
            margin-bottom: 2.2rem;
            line-height: 1.7;
        }
        .hero-buttons {
            display: flex;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .hero-buttons a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.7rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1.08rem;
            text-decoration: none;
            border: none;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(58, 102, 224, 0.10);
        }
        .hero-buttons .primary {
            background: linear-gradient(90deg, #3a66e0 60%, #b3c6ff 100%);
            color: #fff;
        }
        .hero-buttons .primary:hover {
            background: #3a66e0;
            box-shadow: 0 4px 18px rgba(58,102,224,0.18);
        }
        .hero-buttons .secondary {
            background: #fff;
            color: #3a66e0;
            border: 1.5px solid #b3c6ff;
        }
        .hero-buttons .secondary:hover {
            background: #e0eaff;
            color: #25408f;
        }
        .hero-socials {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .hero-socials a {
            background: #fff;
            border-radius: 50%;
            width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a66e0;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(58, 102, 224, 0.07);
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .hero-socials a:hover {
            background: #3a66e0;
            color: #fff;
            transform: scale(1.13) rotate(-8deg);
        }
        .hero-image-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInRight 1.2s cubic-bezier(.4,2,.6,1);
        }
        .hero-image-bg {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            height: 340px;
            background: radial-gradient(circle at 60% 40%, #b3c6ff 60%, #e0eaff 100%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(0.5px);
        }
        .hero-image {
            width: 260px;
            height: 340px;
            object-fit: cover;
            border-radius: 1.5rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 8px 32px rgba(58, 102, 224, 0.13);
            background: #fff;
        }
        .circle-profile {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(58, 102, 224, 0.13);
            background: #fff;
            border: 8px solid #e0eaff;
        }
        @media (max-width: 1000px) {
            .hero-section {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem 1rem;
            }
            .hero-image-bg {
                width: 220px;
                height: 220px;
            }
            .hero-image {
                width: 150px;
                height: 200px;
            }
            .circle-profile {
                width: 140px;
                height: 140px;
            }
            .hero-content h1 {
                font-size: 2.1rem;
            }
            .hero-content h2 {
                font-size: 1.3rem;
            }
        }
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
                gap: 0.7rem;
                padding: 0.7rem 1vw;
            }
            .navbar .logo {
                font-size: 1.3rem;
            }
            .navbar nav a {
                margin: 0 0.5rem;
                font-size: 1rem;
            }
            .navbar .cta-btn {
                font-size: 0.98rem;
                padding: 0.5rem 1.1rem;
            }
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-40px);}
            to { opacity: 1; transform: none;}
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(40px);}
            to { opacity: 1; transform: none;}
        }
    </style>
